<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Halo</title>
    <link rel="stylesheet" href="style/style-checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="main-header">
    <div class="header-left">
        <a href="main_page.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Store
        </a>
    </div>
    <div class="header-center">
        <div class="logo-circle"></div>
        <span class="logo-text">Halo</span>
    </div>
    <div class="header-right">
        <div id="authArea">
            <!-- populated by checkout.js -->
        </div>
    </div>
</header>

<!-- ================= CHECKOUT LAYOUT ================= -->
<main class="checkout-page">

    <h1 class="checkout-title">Checkout</h1>

    <div class="checkout-layout">

        <!-- LEFT: CARD FORM -->
        <section class="card-form-box">
            <h2 class="box-heading">Payment Details</h2>

            <div class="field">
                <label>Cardholder Name</label>
                <input type="text" id="cardName" placeholder="John Doe" maxlength="60" autocomplete="cc-name">
            </div>

            <div class="field">
                <label>Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number" oninput="formatCardNumber(this)">
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Expiry Date</label>
                    <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp" oninput="formatExpiry(this)">
                </div>
                <div class="field">
                    <label>CVV</label>
                    <input type="text" id="cardCvv" placeholder="123" maxlength="4" autocomplete="cc-csc" oninput="this.value=this.value.replace(/\D/g,'')">
                </div>
            </div>

            <div class="error-msg" id="formError"></div>

            <button class="btn-pay" id="btnPay">
                <i class="fa-solid fa-lock"></i> Complete Purchase
            </button>
        </section>

        <!-- RIGHT: ORDER SUMMARY -->
        <section class="order-summary-box">
            <h2 class="box-heading">Order Summary</h2>
            <div id="summaryItems">
                <p class="empty-msg">Loading cart...</p>
            </div>
            <div class="summary-total" id="summaryTotal"></div>
        </section>

    </div>
</main>

<!-- ================= SUCCESS OVERLAY ================= -->
<div class="success-overlay" id="successOverlay">
    <div class="success-card">
        <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h2>Purchase Complete!</h2>
        <p id="successMsg">Your games have been added to your library.</p>
        <a href="main_page.html" class="btn-continue">Continue Shopping</a>
    </div>
</div>

<script type="module" src="script/checkout.js"></script>
</body>
</html>
