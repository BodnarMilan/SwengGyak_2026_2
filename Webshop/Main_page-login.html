<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style/style-login.css">
</head>

<body>

<header>
    <nav class="top-nav">
        <a href="Main_page.html" class="home-btn">← Back to Home page</a>
        
        <div class="preferences-dropdown">
            <button id="regionDisplay" class="dropbtn">Magyar | HUF ▼</button>

            <div class="dropdown-content">
                <p class="Pop-Up-subtitle">Select your preferences</p>

                <form class="Pop-Up-form">
                    <label>Language:</label>
                    <select id="language">
                        <option value="hu">Magyar</option>
                        <option value="en">English</option>
                    </select>

                    <label>Currency:</label>
                    <select id="currency">
                        <option value="huf">HUF</option>
                        <option value="eur">EUR</option>
                    </select>

                    <input id="savePreferences" class="submit-btn" type="submit" value="Save">
                </form>
            </div>
        </div>
    </nav>

    <h1 class="login">Webshop Login</h1>
</header>

<main class="login-container">
    <h2>Please login to access your account</h2>

    <form>
        <label>Username:</label>
        <input type="text" required>

        <label>Password:</label>
        <div class="password-wrapper">
            <input type="password" id="password" required>
            <button type="button" id="togglePassword" class="toggle-password">Show</button>
        </div>

        <input type="submit" value="Login" class="login-btn">
        <hr>
    </form>
</main>

<footer>
    <div class="footer-links">
        <p><a href="page_under_development.html"><b>Terms of use</b></a></p>
        <p><a href="page_under_development.html"><b>Privacy Policy</b></a></p>
    </div>
</footer>
<script src="script/login.js"></script>
</body>
</html>
