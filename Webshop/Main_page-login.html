<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style-login.css">
</head>
<body>
    <header>
    <nav class="top-nav">
        <a href="Main_page.html" class="home-btn">← Back to Home page</a>
        
        <div class="preferences-dropdown">
            <button class="dropbtn">Regional Preferences ▼</button>
            <div class="dropdown-content">
                <p class="Pop-Up-subtitle">Select your preferences</p>
                <form class="Pop-Up-form">
                    <label for="language">Language:</label>
                    <select id="language" name="language">
                        <option value="english" selected>English</option>
                        <option value="spanish">Spanish</option>
                        <option value="french">French</option>
                        <option value="german">German</option>
                        <option value="hungarian">Hungarian</option>
                    </select>

                    <label for="currency">Currency:</label>
                    <select id="currency" name="currency">
                        <option value="usd">USD</option>
                        <option value="eur">EUR</option>
                        <option value="gbp">GBP</option>
                        <option value="huf" selected>HUF</option>
                    </select>
                    
                    <input class="submit-btn" type="submit" value="Save">
                </form>
            </div>
        </div>
    </nav>
    <h1 class="login">Webshop Login</h1>
</header>

<main class="login-container">
    <H2>Please login to access your account</H2>
    <form action="Dashboard.html" method="post">    <!-- Basic login form-->
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <div class="password-wrapper">
        <input type="password" id="password" name="password" required>
        <button type="button" id="togglePassword" class="toggle-password">Show</button>
        </div>
        <input type="submit" value="Login" class="login-btn">
        <hr>
    </form>
</main>
<footer>
    <div class="footer-links">
        <!--    <<p class="Terms-of-use"><a href="Terms_of_use.html"><b>Terms of use</b></a></p>    actual buttons, no function yet
        p class="Privacy-policy"><a href="Privacy_policy.html"><b>Privacy Policy</b></a></p>    -->
        <p class="Terms-of-use"><a href="page_under_development.html"><b>Terms of use</b></a></p>
        <p class="Privacy-policy"><a href="page_under_development.html"><b>Privacy Policy</b></a></p>
    </div>
</footer>

<script>
    const passwordInput = document.querySelector('#password');
    const toggleButton = document.querySelector('#togglePassword');

    toggleButton.addEventListener('click', function () {
        // Toggle the type attribute
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle the button text
        this.textContent = type === 'password' ? 'Show' : 'Hide';
    });
</script>


</body>
</html>
