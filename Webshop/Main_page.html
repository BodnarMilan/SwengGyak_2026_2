<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Halo – Game Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="main-header">

    <div class="header-left">
        <div class="logo-circle"></div>
        <span class="logo-text">Halo</span>
    </div>

    <div class="header-center">
        <input type="text" id="searchInput" placeholder="Search for games, top-ups and more">
    </div>

    <div class="header-right">

        <div class="preferences-dropdown">
            <button id="regionDisplay" class="dropbtn">Magyar | HUF ▼</button>

            <div class="dropdown-content">
                <p class="Pop-Up-subtitle">Select your preferences</p>

                <form class="Pop-Up-form">
                    <label>Language:</label>
                    <select id="language">
                        <option value="hu" selected>Magyar</option>
                        <option value="en">English</option>
                    </select>

                    <label>Currency:</label>
                    <select id="currency">
                        <option value="huf" selected>HUF</option>
                        <option value="eur">EUR</option>
                    </select>

                    <input id="savePreferences" class="submit-btn" type="submit" value="Save">
                </form>
            </div>
        </div>

        <span class="icon">♡</span>
        <span class="icon">🛒</span>
        <a href="Main_page-login.html" class="login-link">Bejelentkezés | Regisztráció</a>

    </div>

</header>

<!-- ================= PLATFORM NAV ================= -->
<nav class="platform-nav">

    <a href="#" class="platform-item active" data-platform="all">
        <i class="fa-solid fa-border-all"></i>
        <span>All</span>
    </a>

    <a href="#" class="platform-item" data-platform="pc">
        <i class="fa-brands fa-windows"></i>
        <span>PC</span>
    </a>

    <a href="#" class="platform-item" data-platform="steam">
        <i class="fa-brands fa-steam"></i>
        <span>Steam</span>
    </a>

    <a href="#" class="platform-item" data-platform="playstation">
        <i class="fa-brands fa-playstation"></i>
        <span>PlayStation</span>
    </a>

    <a href="#" class="platform-item" data-platform="xbox">
        <i class="fa-brands fa-xbox"></i>
        <span>Xbox</span>
    </a>

    <a href="#" class="platform-item" data-platform="nintendo">
        <i class="fa-solid fa-gamepad"></i>
        <span>Nintendo</span>
    </a>

</nav>

<!-- ================= MAIN LAYOUT ================= -->
<div class="main-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="genre-sidebar">

        <h3>Genres</h3>

        <ul>
            <li class="active" data-genre="all">
                <i class="fa-solid fa-border-all"></i>
                <span>All Games</span>
            </li>
            <li data-genre="action"><i class="fa-solid fa-crosshairs"></i><span>Action</span></li>
            <li data-genre="rpg"><i class="fa-solid fa-dragon"></i><span>RPG</span></li>
            <li data-genre="fps"><i class="fa-solid fa-gun"></i><span>FPS</span></li>
            <li data-genre="strategy"><i class="fa-solid fa-chess"></i><span>Strategy</span></li>
            <li data-genre="sports"><i class="fa-solid fa-futbol"></i><span>Sports</span></li>
            <li data-genre="horror"><i class="fa-solid fa-ghost"></i><span>Horror</span></li>
            <li data-genre="indie"><i class="fa-solid fa-puzzle-piece"></i><span>Indie</span></li>
            <li data-genre="open-world"><i class="fa-solid fa-earth-americas"></i><span>Open World</span></li>
            <li data-genre="racing"><i class="fa-solid fa-car"></i><span>Racing</span></li>
            <li data-genre="multiplayer"><i class="fa-solid fa-users"></i><span>Multiplayer</span></li>
            <li data-genre="vr"><i class="fa-solid fa-vr-cardboard"></i><span>VR</span></li>
        </ul>

    </aside>

    <!-- ===== CONTENT AREA ===== -->
    <section class="content-area">

        <h2 class="section-title">Featured Games</h2>

        <div class="game-grid" id="gameGrid">
            <p class="loading-msg">Loading games...</p>
        </div>

    </section>

</div>

<!-- ================= SCRIPT ================= -->
<script type="module" src="script/main.js"></script>

</body>
</html>
