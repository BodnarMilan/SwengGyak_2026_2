<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist – Halo</title>
  <link rel="stylesheet" href="style/dashboard.css" />
  <link rel="stylesheet" href="style/wishlist.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

</head>
<body>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <a href="Main_page.html" class="logo" style="text-decoration:none;">Halo</a>

    <nav class="menu">
      <div class="menu-section">
        <p class="menu-title">My Account</p>
        <a href="dashboard.html" class="menu-item">
          <i class="fa-solid fa-house"></i> Overview
        </a>
        <a href="login-history.html" class="menu-item">
          <i class="fa-solid fa-clock-rotate-left"></i> Login History
        </a>
        <a href="wishlist.html" class="menu-item active-link">
          <i class="fa-regular fa-heart"></i> Wishlist
        </a>
      </div>

      
      <div class="menu-section">
        <p class="menu-title">Account</p>
        <a href="wallet.html" class="menu-item">
          <i class="fa-solid fa-wallet"></i> Wallet
        </a>
        <a href="orders.html" class="menu-item">
          <i class="fa-solid fa-bag-shopping"></i> Orders
        </a>
        <a href="keys.html" class="menu-item">
          <i class="fa-solid fa-key"></i> Keys Library
        </a>
        <a href="settings.html" class="menu-item">
          <i class="fa-solid fa-gear"></i> Settings
        </a>
      </div>

      <div class="menu-section" style="margin-top:auto;padding-top:20px;">
        <button class="menu-item logout-sidebar" id="logoutBtn"
                style="background:none;border:none;cursor:pointer;width:100%;text-align:left;">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </nav>
  </aside>

  <!-- ===== MAIN WRAPPER ===== -->
  <div class="main-wrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <input type="text" id="wlSearch" class="top-search" placeholder="Search wishlist..." />
      </div>
      <div class="topbar-right">
        <a href="Main_page.html" class="topbar-chip" style="text-decoration:none;">← Back to Store</a>
        <div class="avatar" id="avatarInitial">?</div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">
      <div class="breadcrumb">My account / Wishlist</div>
      <h1>WISHLIST <span id="wlCount" style="font-size:1rem;font-weight:500;color:#888;"></span></h1>

      <div id="wishlistContainer">
        <p class="muted-text">Loading...</p>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-columns">
        <div>
          <h4>Account</h4>
          <a href="#">Overview</a>
          <a href="#">Orders</a>
          <a href="#">Settings</a>
        </div>
        <div>
          <h4>Shop</h4>
          <a href="#">Gift Cards</a>
          <a href="#">Deals</a>
          <a href="#">Keys</a>
        </div>
        <div>
          <h4>Help</h4>
          <a href="#">FAQ</a>
          <a href="#">Contact</a>
          <a href="#">Support</a>
        </div>
        <div>
          <h4>Community</h4>
          <a href="#">Discord</a>
          <a href="#">News</a>
          <a href="#">Offers</a>
        </div>
      </div>
    </footer>

  </div>
</div>

<script type="module" src="script/wishlist.js"></script>

</body>
</html>
