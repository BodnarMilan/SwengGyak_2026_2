<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Halo</title>
    <link rel="stylesheet" href="style/style-login.css">
</head>

<body>

<header>
    <nav class="top-nav">
        <a href="main_page-login.html" class="home-btn">← Back to Login</a>

        <div class="preferences-dropdown">
            <button id="regionDisplay" class="dropbtn">Magyar | HUF ▼</button>

            <div class="dropdown-content">
                <p class="Pop-Up-subtitle">Select your preferences</p>

                <form class="Pop-Up-form">
                    <label>Language:</label>
                    <select id="language">
                        <option value="hu">Magyar</option>
                        <option value="en">English</option>
                    </select>

                    <label>Currency:</label>
                    <select id="currency">
                        <option value="huf">HUF</option>
                        <option value="eur">EUR</option>
                    </select>

                    <input id="savePreferences" class="submit-btn" type="submit" value="Save">
                </form>
            </div>
        </div>
    </nav>

    <h1 class="login">Create an Account</h1>
</header>

<main class="login-container">
    <h2>Fill in your details to register</h2>

    <form id="registerForm">

        <label>Email:</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required>
        <div class="field-error" id="emailError"></div>

        <label>Username:</label>
        <input type="text" id="regUsername" placeholder="Choose a username" required>
        <div class="field-error" id="usernameError"></div>

        <label>Password:</label>
        <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Choose a password" required>
            <button type="button" class="toggle-password" onclick="toggleVis('regPassword', this)">Show</button>
        </div>

        <label>Confirm Password:</label>
        <div class="password-wrapper">
            <input type="password" id="regPasswordConfirm" placeholder="Repeat your password" required>
            <button type="button" class="toggle-password" onclick="toggleVis('regPasswordConfirm', this)">Show</button>
        </div>
        <div class="field-error" id="passwordError"></div>

        <div class="error-msg" id="registerError"></div>
        <div class="success-msg" id="registerSuccess"></div>

        <input type="submit" value="Register" class="login-btn">
        <hr>
    </form>

    <div class="register-prompt">
        Already have an account?
        <a href="main_page-login.html" class="register-link">Login here</a>
    </div>
</main>

<footer>
    <div class="footer-links">
        <p><a href="page_under_development.html"><b>Terms of use</b></a></p>
        <p><a href="page_under_development.html"><b>Privacy Policy</b></a></p>
    </div>
</footer>

<script type="module" src="script/register.js"></script>
</body>
</html>
