<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elfelejtett jelszó</title>
    <link rel="stylesheet" href="style/forgot_password.css">
</head>
<body>
    <main class="forgot-page">
        <div class="forgot-card">
            <div class="forgot-logo">
                <div class="logo-circle"></div>
                <div class="logo-text">GameStore</div>
            </div>

            <h1>Forgot Password</h1>
            <p class="forgot-description">
                Enter your email address and we will send you a password reset link.
            </p>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>

            <button class="submit-btn" onclick="resetPassword()">
                Send Reset Link
            </button>

            <div class="message" id="message"></div>

            <a class="back-link" href="main_page-login.html">
                back to login
            </a>
        </div>
    </main>

    <script type="module" src="script/forgot_password.js"></script>

</body>
</html>
